stages:
  - build
  - test
  - deploy

build-job:
  stage: build
  tags:
    - jn
  script:
    - echo "Building Docker image for the workspace..."
    - sudo docker build -t power-equipment-rag-workspace:latest .
    - echo "Build complete."

rag-smoke-job:
  stage: test
  tags:
    - jn
  script:
    - echo "Running one-command RAG/GraphRAG smoke gate inside the built image..."
    - sudo docker run --rm --entrypoint /bin/sh power-equipment-rag-workspace:latest -lc 'cd /app && python scripts/run_rag_smoke_evaluation.py --persist-dir /tmp/rag_smoke_chroma --report-dir /tmp/rag_smoke_reports --collection ci_rag_smoke' > rag_smoke_output.txt
    - cat rag_smoke_output.txt
    - grep "gate_status=pass" rag_smoke_output.txt
    - grep "graphrag_query=pass" rag_smoke_output.txt
    - grep "graphrag_global=pass" rag_smoke_output.txt
    - echo "Running promoted GraphRAG triage regression gate..."
    - sudo docker run --rm --entrypoint /bin/sh power-equipment-rag-workspace:latest -lc 'cd /app && python scripts/run_graphrag_triage_regression.py --dataset /tmp/rag_smoke_chroma/evaluation/graphrag_triage_regression.jsonl --report-dir /tmp/rag_smoke_reports --persist-dir /tmp/rag_smoke_chroma --collection ci_rag_smoke --backend hashing --allow-empty' > graphrag_triage_regression_output.txt
    - cat graphrag_triage_regression_output.txt
    - grep "triage_regression=pass" graphrag_triage_regression_output.txt
    - echo "RAG/GraphRAG smoke gate passed."

deploy-job:
  stage: deploy
  environment: production
  tags:
    - jn
  script:
    - echo "Starting workspace container..."
    - sudo docker rm -f power-equipment-rag-workspace-container || true
    - sudo docker run -d -p 8000:8000 --name power-equipment-rag-workspace-container power-equipment-rag-workspace:latest
    - sleep 30
    - python - <<'PY'
import json
import urllib.request

with urllib.request.urlopen("http://127.0.0.1:8000/api/health", timeout=30) as resp:
    payload = json.loads(resp.read().decode("utf-8"))
print(payload)
assert payload["status"] == "ok", payload
PY
    - sudo docker logs power-equipment-rag-workspace-container
    - sudo docker rm -f power-equipment-rag-workspace-container || true
    - echo "Application successfully deployed."
