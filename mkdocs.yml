site_name: algokit-example
repo_url: https://github.com/guojh/algokit-example
site_url: https://guojh.github.io/algokit-example
site_description: This is a template repository for algorithm kits development.
site_author: Ranhui
edit_uri: edit/main/docs/
repo_name: guojh/algokit-example
copyright: Maintained by <a href="https://guojh.com">guojh</a>.

nav:
  - Home: index.md
  - Modules: modules.md
plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: ["src/algokit_example"]
theme:
  name: material
  feature:
    tabs: true
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/guojh/algokit-example
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/algokit-example

markdown_extensions:
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
